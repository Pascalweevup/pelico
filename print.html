                                                <div>
                                                    <h4 className="font-semibold text-gray-900">{categoryLabels[catKey]}</h4>
                                                    <div className="w-48 bg-gray-200 rounded-full h-1.5 mt-2">
                                                        <div className={`${categoryColors[catKey]} h-1.5 rounded-full`} style={{ width: `${percentage}%` }}></div>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-lg font-bold text-gray-900">{formatEur(catValue)}</p>
                                                <p className="text-xs text-gray-500">HT</p>
                                            </div>
                                        </div>

                                        {/* Lignes de détail */}
                                        {venue.details && venue.details[catKey] && (
                                            <div className="mt-2 pt-4 border-t border-gray-100 space-y-3">
                                                {venue.details[catKey].map((item, idx) => (
                                                    <div key={idx} className="flex flex-col text-sm border-b border-gray-50 pb-2 last:border-0 last:pb-0">
                                                        <div className="flex justify-between items-start gap-4">
                                                            {/* Options in different color */}
                                                            <span className={`font-medium flex items-center gap-2 ${item.isOption ? "text-amber-600" : "text-gray-800"}`}>
                                                                {item.desc}
                                                                {item.isOption && <span className="text-[10px] bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full uppercase font-bold tracking-wider relative top-px">Option</span>}
                                                            </span>
                                                            <span className="text-gray-900 font-bold whitespace-nowrap">{formatEur(item.price)}</span>
                                                        </div>
                                                        {item.subDesc && (
                                                            <div className="text-gray-500 text-xs mt-1 italic leading-relaxed whitespace-pre-line pr-16">
                                                                {item.subDesc}
                                                            </div>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                );
                            })}

                            <div className="bg-gray-50 rounded-lg border border-gray-200 p-4 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                <div>
                                    <h4 className="font-semibold text-gray-900">Honoraires Weever</h4>
                                    <p className="text-sm text-gray-500">Calculés sur le sous-total HT</p>
                                </div>
                                <div className="text-right">
                                    <p className="text-lg font-bold text-gray-900">{formatEur(venue.honorairesHT)}</p>
                                    <p className="text-xs text-gray-500">HT</p>
                                </div>
                            </div>
                        </div>

                        {/* Summary Box */}
                        <div className="lg:col-span-1">
                            <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6 sticky top-24">
                                <h3 className="text-lg font-semibold text-gray-900 mb-4 border-b pb-2">Récapitulatif Financier</h3>
                                <div className="space-y-3 text-sm">
                                    <div className="flex justify-between text-gray-600">
                                        <span>Sous-total HT</span>
                                        <span>{formatEur(subtotalHT)}</span>
                                    </div>
                                    <div className="flex justify-between text-gray-600">
                                        <span>Honoraires HT</span>
                                        <span>{formatEur(venue.honorairesHT)}</span>
                                    </div>
                                    <div className="border-t pt-3 flex justify-between text-gray-500 text-sm">
                                        <span>Total TTC</span>
                                        <span>{formatEur(venue.totalTTC)}</span>
                                    </div>
                                    <div className="border-t pt-3 mt-2 flex justify-between font-bold text-sky-600 text-lg">
                                        <span>Total HT</span>
                                        <span>{formatEur(venue.totalHT)}</span>
                                    </div>
                                </div>

                                <div className="mt-6 bg-blue-50 text-blue-800 text-xs p-3 rounded border border-blue-100">
                                    <strong>Note:</strong> Les montants indiqués (notamment les transports) sont provisionnels et seront ajustés au réel. Les postes RSE sont en option.
                                </div>
                            </div>

                        </div>
                    </div>
                    {/* --- SIDE EVENT --- */}
                    {venue.sideEvent && (
                        <div className="mt-12">
                            <div className="flex items-center gap-4 mb-6">
                                <h3 className="text-xl font-bold text-gray-900">Séminaire FORCE DE VENTE (14/10 - 15/10)</h3>
                                <div className="h-px bg-gray-200 flex-1"></div>
                            </div>
                            
                            <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                                <div>
                                    <h4 className="text-lg font-semibold text-gray-900">Budget Séminaire FORCE DE VENTE</h4>
                                    <p className="text-gray-500">Estimatif pour l'événement secondaire</p>
                                </div>
                                <div className="text-right bg-emerald-50 p-4 rounded-lg border border-emerald-100">
                                    <p className="text-sm font-medium text-emerald-600 uppercase tracking-wider mb-1">Total HT</p>
                                    <p className="text-3xl font-bold text-emerald-900">{formatEur(venue.sideEvent.totalHT)}</p>
                                    <p className="text-xs text-emerald-500 mt-1">Total TTC: {formatEur(venue.sideEvent.totalTTC)}</p>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                <div className="lg:col-span-2 space-y-4">
                                    {Object.entries(venue.sideEvent.categories).filter(([k,v])=>v>0 || (venue.sideEvent.details[k] && venue.sideEvent.details[k].length>0)).map(([catKey, catValue]) => {
                                        const subHT = venue.sideEvent.totalHT - venue.sideEvent.honorairesHT;
                                        const percentage = ((catValue / subHT) * 100).toFixed(1);
                                        return (
                                            <div key={`side-${catKey}`} className="bg-white rounded-lg shadow-sm border border-gray-200 p-4 flex flex-col gap-4">
                                                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                                    <div className="flex items-center gap-3">
                                                        <div className={`min-w-[3.5rem] px-2 h-10 rounded-lg flex items-center justify-center text-white ${categoryColors[catKey] || 'bg-gray-500'}`}>
                                                            <span className="font-bold text-sm">{isNaN(percentage) ? '0.0' : percentage}%</span>
                                                        </div>
                                                        <div>
                                                            <h4 className="font-semibold text-gray-900">{categoryLabels[catKey] || catKey}</h4>
                                                        </div>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className="text-lg font-bold text-gray-900">{formatEur(catValue)}</p>
                                                        <p className="text-xs text-gray-500">HT</p>
                                                    </div>
                                                </div>
                                                {venue.sideEvent.details && venue.sideEvent.details[catKey] && (
                                                    <div className="mt-2 pt-4 border-t border-gray-100 space-y-3">
                                                        {venue.sideEvent.details[catKey].map((item, idx) => (
                                                            <div key={`side-${idx}`} className="flex flex-col text-sm border-b border-gray-50 pb-2 last:border-0 last:pb-0">
                                                                <div className="flex justify-between items-start gap-4">
                                                                    <span className={`font-medium flex items-center gap-2 ${item.isOption ? "text-amber-600" : "text-gray-800"}`}>
                                                                        {item.desc}
                                                                        {item.isOption && <span className="text-[10px] bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full uppercase font-bold tracking-wider relative top-px">Option</span>}
                                                                    </span>
                                                                    <span className="text-gray-900 font-bold whitespace-nowrap">{formatEur(item.price)}</span>
                                                                </div>
                                                                {item.subDesc && (
                                                                    <div className="text-gray-500 text-xs mt-1 italic leading-relaxed whitespace-pre-line pr-16">{item.subDesc}</div>
                                                                )}
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                    <div className="bg-gray-50 rounded-lg border border-gray-200 p-4 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                        <div>
                                            <h4 className="font-semibold text-gray-900">Honoraires Weever (Séminaire FORCE DE VENTE)</h4>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-lg font-bold text-gray-900">{formatEur(venue.sideEvent.honorairesHT)}</p>
                                            <p className="text-xs text-gray-500">HT</p>
                                        </div>
                                    </div>
                                </div>
                                <div className="lg:col-span-1">
                                    {/* Additional info or blank space for side event side panel */}
                                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6 sticky top-24">
                                        <h3 className="text-lg font-semibold text-gray-900 mb-4 border-b pb-2">Récapitulatif Financier Séminaire FORCE DE VENTE</h3>
                                        <div className="space-y-3 text-sm">
                                            <div className="flex justify-between text-gray-600">
                                                <span>Sous-total HT</span>
                                                <span>{formatEur(venue.sideEvent.totalHT - venue.sideEvent.honorairesHT)}</span>
                                            </div>
                                            <div className="flex justify-between text-gray-600">
                                                <span>Honoraires HT</span>
                                                <span>{formatEur(venue.sideEvent.honorairesHT)}</span>
                                            </div>
                                            <div className="border-t pt-3 flex justify-between text-gray-500 text-sm">
                                                <span>Total TTC</span>
                                                <span>{formatEur(venue.sideEvent.totalTTC)}</span>
                                            </div>
                                            <div className="border-t pt-3 mt-2 flex justify-between font-bold text-emerald-600 text-lg">
                                                <span>Total HT</span>
                                                <span>{formatEur(venue.sideEvent.totalHT)}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        
        function App() {
            return (
                <div className="bg-slate-50 font-sans">
                    <div style={{ pageBreakAfter: 'always', paddingBottom: '20px' }}>
                        <header className="bg-white shadow-sm border-b border-gray-200 mb-8 p-4">
                            <h1 className="text-2xl font-bold text-gray-900 flex items-center gap-2">
                                Pelico - Séminaire Septembre
                            </h1>
                            <p className="text-sm text-gray-500">Comparateur interactif de propositions événementielles</p>
                        </header>
                        <main className="max-w-7xl mx-auto px-4">
                            <ComparisonView />
                        </main>
                    </div>

                    {Object.values(budgetData).map(venue => (
                        <div key={venue.id} style={{ pageBreakAfter: 'always', paddingBottom: '20px' }}>
                            <main className="max-w-7xl mx-auto px-4">
                                <VenueDetailView venueId={venue.id} />
                            </main>
                        </div>
                    ))}
                </div>
            );
        }
    // Mount the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

</body>

</html>
